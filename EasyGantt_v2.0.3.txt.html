  // Create a new task below the selected task in the Task selector
  function createNewTask() {
    // Get selected task from the selector
    const taskIdSelector = document.getElementById("taskIdSelector");
    if (!taskIdSelector) {
      alert("Task selector not found.");
      return;
    }
    const selectedOptions = Array.from(taskIdSelector.selectedOptions);
    // Check if more than one task is selected
    if (selectedOptions.length > 1) {
      alert("More than one task is selected in the selector. Only one task must be selected to insert the new task below the selected task.");
      return;
    }
    // Get CSV data
    const { csvText, csvLines, separator } = getCSVData();
    // Handle empty CSV case
    if (!csvText || csvLines.filter(line => line.trim().length > 0).length === 0) {
      const newTaskId = 1;
      const newParentId = 0;
      // Ask for confirmation
      if (!confirm(`Create new task with:\nTask ID: ${newTaskId}\nParent ID: ${newParentId}\n\nDo you want to proceed?`)) {
        return;
      }
      // Create new task with empty values
      const newTaskLine = `${newTaskId}${separator}${separator}${separator}${separator}${separator}${newParentId}${separator}`;
      updateCSVInput(newTaskLine);
      generateGanttChart({ target: { id: "csvInput" } });
      return;
    }
    // Check if exactly one task is selected
    if (selectedOptions.length === 0) {
      alert("No task selected. Please select one task to insert the new task below it.");
      return;
    }
    const selectedTaskId = parseInt(selectedOptions[0].value, 10);
    // Parse CSV to get task information
    const filteredLines = csvLines.filter(line => line.trim().length > 0);
    // Find the selected task and get its parentId
    let selectedTaskParentId = 0;
    let selectedTaskIndex = -1;
    for (let i = 0; i < filteredLines.length; i++) {
      const parts = filteredLines[i].split(separator);
      const taskId = parseInt(parts[0], 10);
      if (taskId === selectedTaskId) {
        selectedTaskParentId = parts[5] ? parseInt(parts[5], 10) : 0;
        // Check if selectedTask is a parent task (has children)
        const children = filteredLines.filter(line => {
          const lineParts = line.split(separator);
          const parentId = lineParts[5] ? parseInt(lineParts[5], 10) : 0;
          return parentId === taskId;
        });
        // If selected task has children, use it as the parent for the new task
        if (children.length > 0) {
          selectedTaskParentId = taskId;
        }
        selectedTaskIndex = i;
        break;
      }
    }
    if (selectedTaskIndex === -1) {
      alert("Selected task not found in CSV.");
      return;
    }
    // Find maximum task ID in CSV
    let maxTaskId = 0;
    filteredLines.forEach(line => {
      const parts = line.split(separator);
      const taskId = parseInt(parts[0], 10);
      if (taskId > maxTaskId) {
        maxTaskId = taskId;
      }
    });
    const newTaskId = maxTaskId + 1;
    const newParentId = selectedTaskParentId;
    // Ask for confirmation
    if (!confirm(`Create new task with:\nTask Id: ${newTaskId}, Parent Id: ${newParentId}\n\nDo you want to proceed?`)) {
      return;
    }
    // Create new task line with empty values for name, duration, percent complete, predecessors, and resources
    const newTaskLine = `${newTaskId}${separator}${separator}${separator}${separator}${separator}${newParentId}${separator}`;
    // Insert the new task line below the selected task
    filteredLines.splice(selectedTaskIndex + 1, 0, newTaskLine);
    // Update CSV input
    updateCSVInput(filteredLines.join("\n"));
    // Regenerate the Gantt chart
    generateGanttChart({ target: { id: "csvInput" } });
  }

  // Delete selected tasks from CSV, including all child tasks if parent is selected, and remove orphan predecessors from the remaining tasks
  function deleteSelectedTasks() {
    // Get selected task IDs from the selector
    const taskIdSelector = document.getElementById("taskIdSelector");
    if (!taskIdSelector) {
      alert("Task selector not found.");
      return;
    }
    const selectedOptions = Array.from(taskIdSelector.selectedOptions);
    if (selectedOptions.length === 0) {
      alert("No tasks selected. Please select one or more tasks to delete.");
      return;
    }
    const selectedTaskIds = selectedOptions.map(option => parseInt(option.value, 10));
    // Read current CSV to get task structure using the new helper function
    const { csvText, csvLines, separator } = getCSVData();
    if (!csvText) {
      alert("No tasks in CSV.");
      return;
    }
    const filteredLines = csvLines.filter(line => line.trim().length > 0);
    // Build task map with parent-child relationships
    const taskMap = new Map();
    filteredLines.forEach(line => {
      const parts = line.split(separator);
      const taskId = parseInt(parts[0], 10);
      const taskName = parts[1] || "";
      const parentId = parts[5] ? parseInt(parts[5], 10) : 0;
      taskMap.set(taskId, { id: taskId, name: taskName, parentId: parentId, line: line });
    });
    // Convert taskMap to array for use with getAllDescendants
    const tasksArray = Array.from(taskMap.values());
    // Collect all tasks to delete (selected + their children)
    const tasksToDelete = new Set();
    const taskDetails = [];
    selectedTaskIds.forEach(taskId => {
      if (taskMap.has(taskId)) {
        tasksToDelete.add(taskId);
        const task = taskMap.get(taskId);
        taskDetails.push(`ID: ${task.id}, Name: ${task.name}`);
        // Find all children recursively using getAllDescendants
        const descendantTasks = getAllDescendants(tasksArray, taskId);
        descendantTasks.forEach(childTask => {
          tasksToDelete.add(childTask.id);
          taskDetails.push(`ID: ${childTask.id}, Name: ${childTask.name} (child of ${task.id})`);
        });
      }
    });
    // Show confirmation dialog
    // Limit message length to avoid confirm() dialog issues (max ~1000-2000 chars depending on browser)
    const maxMessageLength = 800;
    const header = "You are about to delete the following tasks:\n\n";
    const footer = `\n\nTotal tasks to delete: ${tasksToDelete.size}\n\nAre you sure you want to proceed?`;
    const availableLength = maxMessageLength - header.length - footer.length;
    let taskListMessage = taskDetails.join('\n');
    if (taskListMessage.length > availableLength) {
      // Truncate and add indication
      const truncateIndicator = "\n... (list truncated, too many tasks to display)";
      const truncateLength = availableLength - truncateIndicator.length;
      taskListMessage = taskListMessage.substring(0, truncateLength) + truncateIndicator;
    }
    const confirmMessage = header + taskListMessage + footer;
    if (!confirm(confirmMessage)) {
      return;
    }
    // Filter out the tasks to delete
    const updatedLines = filteredLines.filter(line => {
      const parts = line.split(separator);
      const taskId = parseInt(parts[0], 10);
      return !tasksToDelete.has(taskId);
    });
    // Remove predecessors that reference deleted tasks from remaining tasks
    const cleanedLines = updatedLines.map(line => {
      const parts = line.split(separator);
      const predecessorsField = parts[4] || "";
      if (predecessorsField.trim().length === 0) {
        return line; // No predecessors, return as is
      }
      // Parse predecessors 
      const parsedPredecessors = parsePredecessors(predecessorsField);
      const cleanedPredecessors = [];
      // Filter out predecessors that reference deleted tasks
      parsedPredecessors.forEach(pred => {
        // Only keep predecessors that are NOT in the deleted tasks set
        if (!tasksToDelete.has(pred.id)) {
          // Reconstruct the predecessor string with its dependency type and lead/lag
          let predStr = pred.id; // task ID
          if (pred.dependencyType) predStr += pred.dependencyType; // dependency type (FS, FF, SS, SF)
          if (pred.leadLag) predStr += pred.leadLag; // lead/lag 
          cleanedPredecessors.push(predStr);
        }
      });
      // Update the predecessors field
      parts[4] = cleanedPredecessors.join(";");
      return parts.join(separator);
    });
    // Update CSV input 
    updateCSVInput(cleanedLines.join("\n"));
    // Regenerate the Gantt chart
    generateGanttChart({ target: { id: "csvInput" } });
    //alert(`Successfully deleted ${tasksToDelete.size} task(s).`);
  }

  // Indent selected tasks by setting their parentId to the first non-selected task above them
  function indentSelectedTasks() {
    // Get selected task IDs from the selector
    const taskIdSelector = document.getElementById("taskIdSelector");
    if (!taskIdSelector) {
      alert("Task selector not found.");
      return;
    }
    const selectedOptions = Array.from(taskIdSelector.selectedOptions);
    if (selectedOptions.length === 0) {
      alert("No tasks selected. Please select one or more tasks to indent.");
      return;
    }
    const selectedTaskIds = selectedOptions.map(option => parseInt(option.value, 10));
    // Get CSV data
    const { csvText, csvLines, separator } = getCSVData();
    if (!csvText) {
      alert("No tasks in CSV.");
      return;
    }
    const filteredLines = csvLines.filter(line => line.trim().length > 0);
    // Build task map with all task information
    const taskMap = new Map();
    const taskOrder = []; // Maintain order of tasks as they appear in CSV
    filteredLines.forEach((line, index) => {
      const parts = line.split(separator);
      const taskId = parseInt(parts[0], 10);
      const taskName = parts[1] || "";
      const parentId = parts[5] ? parseInt(parts[5], 10) : 0;
      const predecessors = parts[4] || "";
      taskMap.set(taskId, {
        id: taskId,
        name: taskName,
        parentId: parentId,
        predecessors: predecessors,
        line: line,
        index: index,
        parts: parts
      });
      taskOrder.push(taskId);
    });
    // Convert taskMap to array for getAllDescendants
    const tasksArray = Array.from(taskMap.values());
    // Track changes to be made
    const changes = [];
    const predecessorDeletions = [];
    // Track which tasks will become new parents (weren't parents before but will be after indentation)
    const tasksBecomingParents = new Set();
    // Process each selected task
    for (const selectedTaskId of selectedTaskIds) {
      if (!taskMap.has(selectedTaskId)) {
        continue;
      }
      const selectedTask = taskMap.get(selectedTaskId);
      const selectedTaskIndex = selectedTask.index;
      // Find the first non-selected task above the selected task with the same parentId
      let newParentId = selectedTask.parentId; // Initialize to current parentId
      for (let i = selectedTaskIndex - 1; i >= 0; i--) {
        const taskId = taskOrder[i];
        if (!selectedTaskIds.includes(taskId)) {
          const candidateTask = taskMap.get(taskId);
          if (candidateTask && candidateTask.parentId === selectedTask.parentId) {
            newParentId = taskId;
            break;
          }
        }
      }
      // Check if the selected task already has this parent
      if (selectedTask.parentId === newParentId) {
        // No change needed
        continue;
      }
      // If newParentId is not 0, check if this task is becoming a parent
      if (newParentId !== 0) {
        const newParentTask = taskMap.get(newParentId);
        // Check if this task currently has children
        const currentChildren = tasksArray.filter(t => t.parentId === newParentId);
        if (currentChildren.length === 0) {
          // This task will become a parent for the first time
          tasksBecomingParents.add(newParentId);
        }
      }
      // Check if selected task is a parent task (has children)
      const children = tasksArray.filter(t => t.parentId === selectedTaskId);
      if (children.length > 0) {
        // Selected task is a parent - update all its children's parentId
        for (const child of children) {
          changes.push({
            taskId: child.id,
            taskName: child.name,
            oldParentId: child.parentId,
            newParentId: selectedTaskId,
            reason: `Child of task ${selectedTaskId}`
          });
        }
      }
      // Add change for the selected task itself
      changes.push({
        taskId: selectedTaskId,
        taskName: selectedTask.name,
        oldParentId: selectedTask.parentId,
        newParentId: newParentId,
        reason: "Selected task"
      });
    }
    // Check tasks that are becoming parents and have predecessors
    for (const taskId of tasksBecomingParents) {
      const task = taskMap.get(taskId);
      if (task.predecessors && task.predecessors.trim().length > 0) {
        predecessorDeletions.push({
          taskId: taskId,
          taskName: task.name,
          predecessors: task.predecessors
        });
      }
    }
    // Build a post-indentation parent map to detect ancestor violations introduced by indentation
    const postIndentParentMap = new Map();
    for (const [id, task] of taskMap) {
      postIndentParentMap.set(id, task.parentId);
    }
    for (const change of changes) {
      postIndentParentMap.set(change.taskId, change.newParentId);
    }
    // Helper: collect all ancestor IDs of a task using the post-indentation parent map
    function getPostIndentAncestors(taskId) {
      const ancestors = new Set();
      let currentId = postIndentParentMap.get(taskId);
      while (currentId && currentId !== 0) {
        if (ancestors.has(currentId)) break; // guard against cycles
        ancestors.add(currentId);
        currentId = postIndentParentMap.get(currentId);
      }
      return ancestors;
    }
    // Check every task in the CSV for predecessors that will point to itself or an ancestor after indentation
    const tasksWithFullDeletions = new Set(predecessorDeletions.map(d => d.taskId));
    for (const [taskId, task] of taskMap) {
      if (!task.predecessors || task.predecessors.trim().length === 0) continue;
      const parsedPreds = parsePredecessors(task.predecessors);
      if (parsedPreds.length === 0) continue;
      const postIndentAncestors = getPostIndentAncestors(taskId);
      // Determine which predecessor IDs are invalid after indentation (self-reference or ancestor reference)
      const invalidPredIds = new Set(
        parsedPreds
          .filter(p => p.id === taskId || postIndentAncestors.has(p.id))
          .map(p => p.id)
      );
      if (invalidPredIds.size === 0) continue;
      if (tasksWithFullDeletions.has(taskId)) continue; // already handled by full deletion above
      // Reconstruct the string of only the invalid predecessor entries for the confirmation message
      const invalidPredStrings = parsedPreds
        .filter(p => invalidPredIds.has(p.id))
        .map(p => {
          let s = String(p.id);
          if (p.dependencyType && p.dependencyType !== "FS") s += p.dependencyType;
          if (p.leadLag) s += p.leadLag;
          return s;
        })
        .join(";");
      predecessorDeletions.push({
        taskId: taskId,
        taskName: task.name,
        predecessors: invalidPredStrings,
        specificPredecessorIds: invalidPredIds
      });
    }
    // If no changes, inform user
    if (changes.length === 0 && predecessorDeletions.length === 0) {
      alert("No changes needed. All selected tasks already have the correct parent assignments.");
      return;
    }
    // Build confirmation message
    let confirmMessage = "The following changes will be made:\n\n";
    if (changes.length > 0) {
      confirmMessage += "Parent Id changes:\n";
      for (const change of changes) {
        if (change.oldParentId !== change.newParentId) {
          confirmMessage += `Task ID: ${change.taskId}: `;
          confirmMessage += `  Old Parent ID: ${change.oldParentId} → New Parent ID: ${change.newParentId}\n`;
        }
      }
    }
    if (predecessorDeletions.length > 0) {
      confirmMessage += "\nPredecessors to be deleted:\n";
      for (const deletion of predecessorDeletions) {
        confirmMessage += `Task ID: ${deletion.taskId}: `;
        confirmMessage += `  Predecessors: ${deletion.predecessors}\n`;
      }
    }
    // Truncate the message if it's too long
    const maxMessageLength = 800;
    if (confirmMessage.length > maxMessageLength) {
      // Truncate and add indication
      const truncateIndicator = "\n... (list truncated, too many tasks to display)";
      const truncateLength = maxMessageLength - truncateIndicator.length;
      confirmMessage = comfirmMessage.substring(0, truncateLength) + truncateIndicator;
    }
    // Add final confirmation prompt
    confirmMessage += "\nDo you want to proceed with these changes?";
    // Ask for confirmation
    if (!confirm(confirmMessage)) {
      return;
    }
    // Apply changes to the CSV
    const updatedLines = filteredLines.map(line => {
      const parts = line.split(separator);
      const taskId = parseInt(parts[0], 10);
      // Check if this task needs parent ID update
      const change = changes.find(c => c.taskId === taskId);
      if (change) {
        parts[5] = change.newParentId.toString();
      }
      // Check if this task needs predecessor deletion
      const deletion = predecessorDeletions.find(d => d.taskId === taskId);
      if (deletion) {
        if (deletion.specificPredecessorIds) {
          // Partial deletion: remove only the invalid predecessor entries
          const parsedPreds = parsePredecessors(parts[4] || "");
          const keptPreds = parsedPreds
            .filter(p => !deletion.specificPredecessorIds.has(p.id))
            .map(p => {
              let s = String(p.id);
              if (p.dependencyType) s += p.dependencyType;
              if (p.leadLag) s += p.leadLag;
              return s;
            });
          parts[4] = keptPreds.join(";");
        } else {
          parts[4] = ""; // Clear all predecessors (task became a parent)
        }
      }
      return parts.join(separator);
    });
    // Update CSV input
    updateCSVInput(updatedLines.join("\n"));
    // Regenerate the Gantt chart
    generateGanttChart({ target: { id: "csvInput" } });
  }

  // Outdent selected tasks by setting their parentId to their parent's parentId (one level up)
  function outdentSelectedTasks() {
    // Get selected task IDs from the selector
    const taskIdSelector = document.getElementById("taskIdSelector");
    if (!taskIdSelector) {
      alert("Task selector not found.");
      return;
    }
    const selectedOptions = Array.from(taskIdSelector.selectedOptions);
    if (selectedOptions.length === 0) {
      alert("No tasks selected. Please select one or more tasks to outdent.");
      return;
    }
    const selectedTaskIds = selectedOptions.map(option => parseInt(option.value, 10));
    // Get CSV data
    const { csvText, csvLines, separator } = getCSVData();
    if (!csvText) {
      alert("No tasks in CSV.");
      return;
    }
    const filteredLines = csvLines.filter(line => line.trim().length > 0);
    // Build task map with all task information
    const taskMap = new Map();
    const taskOrder = []; // Maintain order of tasks as they appear in CSV
    filteredLines.forEach((line, index) => {
      const parts = line.split(separator);
      const taskId = parseInt(parts[0], 10);
      const taskName = parts[1] || "";
      const parentId = parts[5] ? parseInt(parts[5], 10) : 0;
      const predecessors = parts[4] || "";
      taskMap.set(taskId, {
        id: taskId,
        name: taskName,
        parentId: parentId,
        predecessors: predecessors,
        line: line,
        index: index,
        parts: parts
      });
      taskOrder.push(taskId);
    });
    // Convert taskMap to array for getAllDescendants
    const tasksArray = Array.from(taskMap.values());
    // Track changes to be made
    const changes = [];
    const predecessorDeletions = [];
    // Track old parent tasks that may lose all their children (become leaves) after outdentation
    const tasksLosingLastChild = new Set();
    // Process each selected task
    for (const selectedTaskId of selectedTaskIds) {
      if (!taskMap.has(selectedTaskId)) {
        continue;
      }
      const selectedTask = taskMap.get(selectedTaskId);
      // A task at root level (parentId === 0) cannot be outdented further
      if (selectedTask.parentId === 0) {
        continue;
      }
      const oldParentTask = taskMap.get(selectedTask.parentId);
      if (!oldParentTask) {
        continue;
      }
      // New parentId is the grandparent (parent's parentId)
      const newParentId = oldParentTask.parentId;
      // Check if the selected task already has this parent (no-op guard)
      if (selectedTask.parentId === newParentId) {
        continue;
      }
      // Check if the old parent will lose its last non-selected child after this outdent
      const remainingChildren = tasksArray.filter(
        t => t.parentId === selectedTask.parentId && !selectedTaskIds.includes(t.id)
      );
      if (remainingChildren.length === 0) {
        // The old parent becomes a leaf — its predecessors may now be invalid
        tasksLosingLastChild.add(selectedTask.parentId);
      }
      // Add change for the selected task itself (children keep their parentId, staying under it)
      changes.push({
        taskId: selectedTaskId,
        taskName: selectedTask.name,
        oldParentId: selectedTask.parentId,
        newParentId: newParentId,
        reason: "Selected task"
      });
    }
    // Build a post-outdentation parent map to detect ancestor violations introduced by outdentation
    const postOutdentParentMap = new Map();
    for (const [id, task] of taskMap) {
      postOutdentParentMap.set(id, task.parentId);
    }
    for (const change of changes) {
      postOutdentParentMap.set(change.taskId, change.newParentId);
    }
    // Helper: collect all ancestor IDs of a task using the post-outdentation parent map
    function getPostOutdentAncestors(taskId) {
      const ancestors = new Set();
      let currentId = postOutdentParentMap.get(taskId);
      while (currentId && currentId !== 0) {
        if (ancestors.has(currentId)) break; // guard against cycles
        ancestors.add(currentId);
        currentId = postOutdentParentMap.get(currentId);
      }
      return ancestors;
    }
    // Old parents that become leaves: clear predecessors if they would now be invalid
    for (const taskId of tasksLosingLastChild) {
      const task = taskMap.get(taskId);
      if (task && task.predecessors && task.predecessors.trim().length > 0) {
        predecessorDeletions.push({
          taskId: taskId,
          taskName: task.name,
          predecessors: task.predecessors
        });
      }
    }
    // Check every task in the CSV for predecessors that will point to itself or an ancestor after outdentation
    const tasksWithFullDeletions = new Set(predecessorDeletions.map(d => d.taskId));
    for (const [taskId, task] of taskMap) {
      if (!task.predecessors || task.predecessors.trim().length === 0) continue;
      const parsedPreds = parsePredecessors(task.predecessors);
      if (parsedPreds.length === 0) continue;
      const postOutdentAncestors = getPostOutdentAncestors(taskId);
      // Determine which predecessor IDs are invalid after outdentation (self-reference or ancestor reference)
      const invalidPredIds = new Set(
        parsedPreds
          .filter(p => p.id === taskId || postOutdentAncestors.has(p.id))
          .map(p => p.id)
      );
      if (invalidPredIds.size === 0) continue;
      if (tasksWithFullDeletions.has(taskId)) continue; // already handled by full deletion above
      // Reconstruct the string of only the invalid predecessor entries for the confirmation message
      const invalidPredStrings = parsedPreds
        .filter(p => invalidPredIds.has(p.id))
        .map(p => {
          let s = String(p.id);
          if (p.dependencyType && p.dependencyType !== "FS") s += p.dependencyType;
          if (p.leadLag) s += p.leadLag;
          return s;
        })
        .join(";");
      predecessorDeletions.push({
        taskId: taskId,
        taskName: task.name,
        predecessors: invalidPredStrings,
        specificPredecessorIds: invalidPredIds
      });
    }
    // If no changes, inform user
    if (changes.length === 0 && predecessorDeletions.length === 0) {
      alert("No changes needed. All selected tasks are already at root level or cannot be outdented.");
      return;
    }
    // Build confirmation message
    let confirmMessage = "The following changes will be made:\n\n";
    if (changes.length > 0) {
      confirmMessage += "Parent Id changes:\n";
      for (const change of changes) {
        if (change.oldParentId !== change.newParentId) {
          confirmMessage += `Task ID: ${change.taskId}: `;
          confirmMessage += `  Old Parent ID: ${change.oldParentId} → New Parent ID: ${change.newParentId}\n`;
        }
      }
    }
    if (predecessorDeletions.length > 0) {
      confirmMessage += "\nPredecessors to be deleted:\n";
      for (const deletion of predecessorDeletions) {
        confirmMessage += `Task ID: ${deletion.taskId}: `;
        confirmMessage += `  Predecessors: ${deletion.predecessors}\n`;
      }
    }
    // Truncate the message if it's too long
    const maxMessageLength = 800;
    if (confirmMessage.length > maxMessageLength) {
      const truncateIndicator = "\n... (list truncated, too many tasks to display)";
      const truncateLength = maxMessageLength - truncateIndicator.length;
      confirmMessage = confirmMessage.substring(0, truncateLength) + truncateIndicator;
    }
    // Add final confirmation prompt
    confirmMessage += "\nDo you want to proceed with these changes?";
    // Ask for confirmation
    if (!confirm(confirmMessage)) {
      return;
    }
    // Phase 1: apply parentId and predecessor changes into an updatedTaskMap
    const updatedTaskMap = new Map(taskMap);
    for (const change of changes) {
      const task = updatedTaskMap.get(change.taskId);
      if (task) {
        const parts = task.parts.slice(); // copy to avoid mutating original
        parts[5] = change.newParentId.toString();
        updatedTaskMap.set(change.taskId, { ...task, parentId: change.newParentId, parts, line: parts.join(separator) });
      }
    }
    for (const deletion of predecessorDeletions) {
      const task = updatedTaskMap.get(deletion.taskId);
      if (task) {
        const parts = task.parts.slice();
        if (deletion.specificPredecessorIds) {
          // Partial deletion: remove only the invalid predecessor entries
          const parsedPreds = parsePredecessors(parts[4] || "");
          const keptPreds = parsedPreds
            .filter(p => !deletion.specificPredecessorIds.has(p.id))
            .map(p => {
              let s = String(p.id);
              if (p.dependencyType) s += p.dependencyType;
              if (p.leadLag) s += p.leadLag;
              return s;
            });
          parts[4] = keptPreds.join(";");
        } else {
          parts[4] = ""; // Clear all predecessors (task became a leaf)
        }
        updatedTaskMap.set(deletion.taskId, { ...task, parts, line: parts.join(separator) });
      }
    }
    // Phase 2: reorder — move each outdented task's block (task + its descendants)
    // to immediately after the last task in the old parent's subtree.
    const reorderedTaskIds = taskOrder.slice();
    const movedTaskIds = new Set();
    // Sort changes by their original CSV index so we process top-to-bottom
    const orderedChanges = changes.slice().sort((a, b) => {
      return taskMap.get(a.taskId).index - taskMap.get(b.taskId).index;
    });
    for (const change of orderedChanges) {
      const selectedTaskId = change.taskId;
      if (movedTaskIds.has(selectedTaskId)) continue;
      // Collect the block to move: the selected task + all its descendants (in current order)
      const descendants = getAllDescendants(Array.from(updatedTaskMap.values()), selectedTaskId);
      const blockIds = [selectedTaskId, ...descendants.map(d => d.id)];
      // Mark all as moved
      blockIds.forEach(id => movedTaskIds.add(id));
      // Find the old parent's full subtree end position in the current reorderedTaskIds array.
      const oldParentId = change.oldParentId;
      const oldParentDescendants = getAllDescendants(tasksArray, oldParentId);
      const oldParentSubtreeIds = new Set([oldParentId, ...oldParentDescendants.map(d => d.id)]);
      // Remove all blockIds from their current positions
      for (let i = reorderedTaskIds.length - 1; i >= 0; i--) {
        if (blockIds.includes(reorderedTaskIds[i])) {
          reorderedTaskIds.splice(i, 1);
        }
      }
      // Find the last position in reorderedTaskIds still occupied by the old parent's subtree
      let insertAfterIndex = -1;
      for (let i = 0; i < reorderedTaskIds.length; i++) {
        if (oldParentSubtreeIds.has(reorderedTaskIds[i])) {
          insertAfterIndex = i;
        }
      }
      // Insert the block immediately after the old parent's subtree
      if (insertAfterIndex !== -1) {
        reorderedTaskIds.splice(insertAfterIndex + 1, 0, ...blockIds);
      } else {
        // Old parent not found (edge case) — append at end
        reorderedTaskIds.push(...blockIds);
      }
    }
    // Build final CSV lines from the reordered task IDs
    const updatedLines = reorderedTaskIds
      .map(taskId => {
        const task = updatedTaskMap.get(taskId);
        return task ? task.line : "";
      })
      .filter(line => line.length > 0);
    // Update CSV input
    updateCSVInput(updatedLines.join("\n"));
    // Regenerate the Gantt chart
    generateGanttChart({ target: { id: "csvInput" } });
  }
